<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editable Grid</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="grid-container">
      <table>
        <thead>
          <tr>

            <!-- this is for the columns and the first one is empty for the row numbers -->
            <th></th>
            <th>A</th>
            <th>B</th>
            <th>C</th>
            <th>D</th>
            <th>E</th>
            <th>F</th>
            <th>G</th>
            <th>H</th>
            <th>I</th>
            <th>J</th>

          </tr>
        </thead>

        <!-- this is for the rows and all the cells will be rendered by javascript -->
        <tbody id="grid-body"></tbody>

      </table>
    </div>
    <script src="script.js"></script>
  </body>
</html>
